<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8e8e8;
    }

    body.layout-solar-system { background: #00000a; color: #e8e0f0; font-family: 'Cinzel', Georgia, serif; }

    /* --- BACKGROUND E CANVAS --- */
    .cl-solar-page { display: none; position: fixed; inset: 0; z-index: 1; }
    body.layout-solar-system .cl-solar-page { display: block; }
    
    body.layout-solar-system #stars { 
      position: fixed; inset: 0; z-index: 0; pointer-events: none; 
    }
    
    /* Ocultar estrelas se o GM definir um fundo customizado */
    body.has-custom-bg #stars { display: none !important; }

    body.layout-solar-system .scene {
      position: relative; z-index: 1;
      width: 100%; height: 100%;
    }

    /* --- LÓGICA DO SISTEMA SOLAR ORIGINAL (2D) --- */
    .solar-system {
      width: 100%; height: 100%;
      position: relative;
    }

    /* Sol / Centro Original */
    .sun {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff, #fde047, #ca8a04);
      box-shadow: 0 0 60px 20px rgba(250,204,21,0.4), 0 0 100px 40px rgba(250,204,21,0.2);
      z-index: 10;
    }

    /* Anéis de Órbita Originais */
    .orbit-ring {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      border: 1px dashed rgba(255,255,255,0.15); border-radius: 50%;
      z-index: 1; pointer-events: none;
    }

    /* Contentor do Planeta Originais */
    .planet-wrap {
      position: absolute; top: 50%; left: 50%;
      width: 0; height: 0; z-index: 5;
    }

    /* O Planeta Original (Avatar) */
    .planet {
      position: absolute; top: -24px; left: -24px;
      width: 48px; height: 48px; border-radius: 50%; overflow: hidden;
      box-shadow: inset -8px -8px 12px rgba(0,0,0,0.8), 0 0 15px rgba(0,0,0,0.6);
      cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s;
    }

    .planet:hover {
      transform: scale(1.3);
      box-shadow: 0 0 25px rgba(255,255,255,0.4);
      z-index: 20;
    }

    .planet img {
      width: 100%; height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    /* Novo rótulo global posicionado na parte inferior central */
    .cl-global-name-label {
      position: fixed;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      font-family: 'Cinzel', serif;
      font-size: clamp(1.8rem, 3.5vw, 3.2rem);
      font-weight: 600;
      color: rgba(255, 255, 255, 0.95);
      text-transform: uppercase;
      text-align: center;
      letter-spacing: 0.12em;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.9), 0 0 25px rgba(56, 189, 248, 0.6);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      white-space: nowrap;
    }
    .cl-global-name-label.visible {
      opacity: 1;
      transform: translate(-50%, -10px);
    }

    #cl-status {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: sans-serif; font-size: 1.2rem; color: #aaa; pointer-events: none;
    }
  </style>
</head>
<body>
  
  <div class="cl-solar-page">
    <canvas id="stars"></canvas>
    <div class="scene">
      <div class="solar-system" id="solar-system"></div>
    </div>
    <!-- Elemento para exibir o nome do jogador no espaço inferior -->
    <div id="cl-global-name-label" class="cl-global-name-label"></div>
  </div>

  <div id="cl-status">Loading&hellip;</div>

  <script src="/modules/custom-login/assets/screens/shared.js"></script>
  <script>
    try {
      history.replaceState(null, '', 'index.html');
    } catch (e) {
      console.warn('O replaceState foi bloqueado. Ignorando.', e);
    }

    /**
     * Animação do fundo estrelado com Paralaxe
     */
    function drawStars() {
      const canvas = document.getElementById('stars');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let width = canvas.width = window.innerWidth;
      let height = canvas.height = window.innerHeight;
      let stars = [];
      let animationFrameId;

      function initStars() {
        stars = [];
        for (let i = 0; i < 250; i++) {
          const radius = Math.random() * 1.5 + 0.5;
          stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            r: radius,
            // Paralaxe: estrelas maiores movem-se ligeiramente mais rápido
            speed: radius * 0.4 + 0.05, 
            opacity: Math.random() * 0.8 + 0.2
          });
        }
      }

      function animateStars() {
        ctx.clearRect(0, 0, width, height);
        
        for (let star of stars) {
          ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
          ctx.fill();

          // Move as estrelas continuamente da esquerda para a direita
          star.x += star.speed;

          // Se a estrela sair pelo lado direito, recria-a no lado esquerdo
          if (star.x > width) {
            star.x = -5; // Fora do ecrã para uma entrada suave
            star.y = Math.random() * height;
          }
          
          // Efeito subtil de cintilação orgânica
          star.opacity += (Math.random() - 0.5) * 0.03;
          if (star.opacity < 0.1) star.opacity = 0.1;
          if (star.opacity > 1) star.opacity = 1;
        }
        animationFrameId = requestAnimationFrame(animateStars);
      }

      window.removeEventListener('resize', resizeCanvas);
      function resizeCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        initStars();
      }
      window.addEventListener('resize', resizeCanvas);

      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      initStars();
      animateStars();
    }

    /**
     * Constrói o sistema solar plano 2D Original
     */
    function buildSystem(entries, showNames, hoverAudio, joinAudio) {
      const system = document.getElementById('solar-system');
      system.innerHTML = '';
      
      const sun = document.createElement('div');
      sun.className = 'sun';
      system.appendChild(sun);

      const maxR = Math.min(window.innerWidth, window.innerHeight) / 2 - 40;
      const n = entries.length;
      const step = (maxR - 80) / Math.max(1, n);

      entries.forEach((entry, i) => {
        const r = 90 + i * step;
        
        const ring = document.createElement('div');
        ring.className = 'orbit-ring';
        ring.style.width = ring.style.height = (r * 2) + 'px';
        system.appendChild(ring);

        const wrap = document.createElement('div');
        wrap.className = 'planet-wrap';
        system.appendChild(wrap);

        const p = document.createElement('div');
        p.className = 'planet';
        
        if (entry.imageUrl) {
          const img = document.createElement('img');
          img.src = toAbsolute(entry.imageUrl);
          img.alt = esc(displayName(entry));
          img.draggable = false;
          p.appendChild(img);
        } else {
          const ph = document.createElement('div');
          ph.style.cssText = 'width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1a1b26;';
          ph.textContent = displayName(entry).charAt(0).toUpperCase();
          p.appendChild(ph);
        }

        wrap.appendChild(p);

        // Eventos de Rato
        p.addEventListener('mouseenter', () => {
          if (showNames) {
            const globalLabel = document.getElementById('cl-global-name-label');
            if (globalLabel) {
              globalLabel.textContent = displayName(entry);
              globalLabel.classList.add('visible');
            }
          }
          if (hoverAudio) {
            hoverAudio.currentTime = 0;
            hoverAudio.play().catch(() => {});
          }
        });

        p.addEventListener('mouseleave', () => {
          if (showNames) {
            const globalLabel = document.getElementById('cl-global-name-label');
            if (globalLabel) {
              globalLabel.classList.remove('visible');
            }
          }
        });

        p.addEventListener('click', () => {
          const doLogin = async (pw) => {
            if (joinAudio) {
              joinAudio.currentTime = 0;
              joinAudio.play().catch(() => {});
              await new Promise(res => { joinAudio.addEventListener('ended', res, { once: true }); setTimeout(res, 1500); });
            }
            loginAs(entry.userId, pw);
          };
          if (entry.requirePassword) {
            showPasswordDialog(doLogin);
          } else {
            doLogin('');
          }
        });

        // Movimento circular original
        let angle = Math.random() * Math.PI * 2;
        const speed = (0.002 + Math.random() * 0.003) * (i % 2 === 0 ? 1 : -1);

        function anim() {
          angle += speed;
          wrap.style.transform = `translate(${Math.cos(angle) * r}px, ${Math.sin(angle) * r}px)`;
          requestAnimationFrame(anim);
        }
        anim();
      });
    }

    async function init() {
      injectSharedStyles();
      const statusEl = document.getElementById('cl-status');
      const jsonPath = await resolveJsonPath();
      if (!jsonPath) { await showNoWorldPage(); return; }

      const res = await fetch(jsonPath, { cache: 'no-cache' });
      if (res.status === 404) { await showNoWorldPage(); return; }
      if (!res.ok) { statusEl.textContent = 'Could not load player list (' + res.status + ').'; return; }

      const raw = await res.json();
      const entries    = Array.isArray(raw) ? raw : (raw.entries    ?? []);
      const appearance = Array.isArray(raw) ? {}  : (raw.appearance ?? {});
      const soundCfg   = Array.isArray(raw) ? {}  : (raw.sounds     ?? {});

      const hoverAudio = new Audio(toAbsolute(soundCfg.hoverSound || 'modules/custom-login/assets/sfx/hover.mp3'));
      const joinAudio  = new Audio(toAbsolute(soundCfg.joinSound  || 'modules/custom-login/assets/sfx/join.mp3'));
      hoverAudio.volume = 0.6;
      joinAudio.volume  = 0.8;

      if (appearance.backgroundUrl) {
        document.body.classList.add('has-custom-bg');
        applyBackground(appearance.backgroundUrl, { videoAudio: appearance.videoAudio });
      }

      const faviconLink = document.createElement('link');
      faviconLink.rel = 'shortcut icon';
      faviconLink.href = toAbsolute(appearance.faviconUrl || 'modules/custom-login/assets/screens/favicon.ico');
      document.head.appendChild(faviconLink);

      document.title = appearance.screenTitle || 'Welcome';

      const valid = entries.filter(e => e.userId);
      if (!valid.length) {
        statusEl.textContent = 'No players configured yet. Ask your GM to set up the welcome page.';
        return;
      }

      const showNames = (appearance.showNames ?? 'yes') !== 'no';
      statusEl.remove();

      document.body.classList.add('layout-solar-system');
      
      drawStars();
      buildSystem(valid, showNames, hoverAudio, joinAudio);
    }

    init();
  </script>
</body>
</html>
